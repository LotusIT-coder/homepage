<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Illustration fuer Markenkern und innere Klarheit</title>
  <desc id="desc">Abstraktes Motiv mit schwebender Kugel ueber einem offenen Kubus als Bild fuer Kern spueren und klare Positionierung.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f56f8f"/>
      <stop offset="28%" stop-color="#ffbc73"/>
      <stop offset="68%" stop-color="#f4e8b8"/>
      <stop offset="100%" stop-color="#8fe0d6"/>
    </linearGradient>
    <radialGradient id="sphereGrad" cx="68%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="18%" stop-color="#ffd59b"/>
      <stop offset="52%" stop-color="#ff9a3a"/>
      <stop offset="76%" stop-color="#d44b6c"/>
      <stop offset="100%" stop-color="#9f1f7d"/>
    </radialGradient>
    <radialGradient id="sphereGlow" cx="70%" cy="24%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#fff6d8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fff6d8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leftFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6c4f"/>
      <stop offset="100%" stop-color="#c44743"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff6d8"/>
      <stop offset="56%" stop-color="#f5e6b4"/>
      <stop offset="100%" stop-color="#b7ddd3"/>
    </linearGradient>
    <linearGradient id="topFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd6a0"/>
      <stop offset="100%" stop-color="#fff8dd"/>
    </linearGradient>
    <radialGradient id="holeGrad" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#d47e2f"/>
      <stop offset="48%" stop-color="#f5c06a"/>
      <stop offset="100%" stop-color="#fff1d0"/>
    </radialGradient>
    <radialGradient id="floorGlow" cx="30%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#ff6e4b" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ff6e4b" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurLarge" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#7a4d49" flood-opacity="0.18"/>
    </filter>
    <mask id="topCutout">
      <rect width="960" height="640" fill="#fff"/>
      <ellipse cx="480" cy="366" rx="118" ry="44" fill="#000"/>
    </mask>
  </defs>

  <rect width="960" height="640" fill="url(#bg)"/>
  <ellipse cx="160" cy="636" rx="260" ry="92" fill="url(#floorGlow)" filter="url(#blurLarge)"/>
  <ellipse cx="776" cy="544" rx="192" ry="118" fill="#d7efe7" opacity="0.42" filter="url(#blurLarge)"/>

  <g filter="url(#shadow)">
    <ellipse cx="476" cy="446" rx="130" ry="38" fill="#cc7a43" opacity="0.28" filter="url(#blurLarge)"/>
    <circle cx="476" cy="236" r="145" fill="url(#sphereGrad)"/>
    <circle cx="524" cy="186" r="88" fill="url(#sphereGlow)"/>
  </g>

  <g filter="url(#shadow)">
    <polygon points="188,430 480,326 480,632 188,556" fill="url(#leftFace)"/>
    <polygon points="480,326 768,432 768,640 480,632" fill="url(#rightFace)"/>
    <polygon points="188,430 480,326 768,432 480,530" fill="url(#topFace)" mask="url(#topCutout)"/>
    <ellipse cx="480" cy="366" rx="118" ry="44" fill="url(#holeGrad)"/>
    <ellipse cx="480" cy="366" rx="104" ry="34" fill="#f1b261" opacity="0.74"/>
    <ellipse cx="480" cy="366" rx="88" ry="24" fill="#d47a2c" opacity="0.45"/>
  </g>

  <path d="M188 556l292 76 288 8" fill="none" stroke="#3d3538" stroke-opacity="0.16" stroke-width="3"/>
</svg>