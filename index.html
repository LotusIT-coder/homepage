<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <title>Lotus – IT-Services &amp; Consulting</title>
  <meta name="description" content="Lotus: Application Support, Systemanalyse &amp; Debugging und Prozessautomatisierung – oder kreative Zielgruppenberatung &amp; Webshop-Erstellung. Wählen Sie Ihren Weg." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#1e2033" />

  <link rel="stylesheet" href="fonts/fonts.css" />
  <link rel="stylesheet" href="landing.css" />
</head>
<body class="landing-page">

  <!-- Lotus SVG symbol -->
  <svg aria-hidden="true" style="display:none" xmlns="http://www.w3.org/2000/svg">
    <symbol id="lotus" viewBox="0 0 24 24" fill="none">
      <path d="M11 16 C5.5 15.5 2.5 12 4 7.5 C8.5 9 10.5 13 11 16Z" fill="currentColor" opacity="0.45"/>
      <path d="M13 16 C18.5 15.5 21.5 12 20 7.5 C15.5 9 13.5 13 13 16Z" fill="currentColor" opacity="0.45"/>
      <path d="M12 15 C7.5 13 6.5 7.5 8.5 3.5 C10.5 7 12 12 12 15Z" fill="currentColor" opacity="0.68"/>
      <path d="M12 15 C16.5 13 17.5 7.5 15.5 3.5 C13.5 7 12 12 12 15Z" fill="currentColor" opacity="0.68"/>
      <path d="M12 15 C10 11 10 6 12 1.5 C14 6 14 11 12 15Z" fill="currentColor"/>
      <circle cx="12" cy="15.5" r="1.2" fill="currentColor"/>
    </symbol>
  </svg>

  <main class="landing-wrapper">
    <div class="landing-divider" aria-hidden="true">
      <svg viewBox="0 0 240 1000" preserveAspectRatio="none" focusable="false">
        <defs>
          <linearGradient id="landing-divider-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fbf8ef" />
            <stop offset="44%" stop-color="#f4f0e6" />
            <stop offset="100%" stop-color="#edf4ed" />
          </linearGradient>
        </defs>
        <path fill="url(#landing-divider-gradient)" d="M128 0 C88 86 78 212 104 340 C126 452 126 560 102 666 C74 796 82 914 126 1000 L240 1000 L240 0 Z" />
      </svg>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════
         LEFT SIDE: LOTUS IT-SERVICES (Technical, Dark, Professional)
    ════════════════════════════════════════════════════════════════ -->
    <section class="landing-half landing-it">
      <div class="landing-half__background" aria-hidden="true">
        <!-- Particle canvas -->
        <canvas id="landing-it-canvas" class="landing-it-canvas" aria-hidden="true"></canvas>
        <!-- Subtle grid -->
        <div class="landing-grid"></div>
        <!-- Animated orbs -->
        <div class="landing-orb landing-orb-1" aria-hidden="true"></div>
        <div class="landing-orb landing-orb-2" aria-hidden="true"></div>
        <div class="landing-orb landing-orb-3" aria-hidden="true"></div>
      </div>

      <div class="landing-half__content">
        <a href="it-services.html" class="landing-choice landing-choice--it" aria-label="Zu Lotus IT-Services">
          <div class="landing-logo">
            <svg class="landing-logo__icon" aria-hidden="true"><use href="#lotus"/></svg>
            <div>
              <h1 class="landing-logo__title">Lotus <strong>IT-Services</strong></h1>
              <p class="landing-logo__subtitle">Sichere Systeme. Stabiler Betrieb.</p>
            </div>
          </div>
          <p class="landing-choice__hint">Jetzt öffnen →</p>
        </a>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════════════════════
         RIGHT SIDE: LOTUS CONSULTING (Creative, Light, Friendly)
    ════════════════════════════════════════════════════════════════ -->
    <section class="landing-half landing-consulting">
      <div class="landing-half__background landing-half__background--light" aria-hidden="true">
        <!-- Soft background shapes -->
        <div class="landing-shape landing-shape-1" aria-hidden="true"></div>
        <div class="landing-shape landing-shape-2" aria-hidden="true"></div>
        <div class="landing-shape landing-shape-3" aria-hidden="true"></div>
      </div>

      <div class="landing-half__content">
        <a href="consulting.html" class="landing-choice landing-choice--consulting" aria-label="Zu Lotus Consulting">
          <div class="landing-logo landing-logo--light">
            <svg class="landing-logo__icon landing-logo__icon--consulting" aria-hidden="true"><use href="#lotus"/></svg>
            <div>
              <h1 class="landing-logo__title landing-logo__title--light">Lotus <strong>Consulting</strong></h1>
              <p class="landing-logo__subtitle landing-logo__subtitle--light">Marken- &amp; Unternehmensberatung. Kreativ und strategisch.</p>
            </div>
          </div>
          <p class="landing-choice__hint">Jetzt öffnen →</p>
        </a>
      </div>
    </section>

  </main>

  <script src="landing.js"></script>
</body>
</html>
